name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  metadata:
    name: Check release version
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.release.outputs.version }}
      should_release: ${{ steps.release.outputs.should_release }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate release metadata
        run: npm run release:check

      - name: Check whether this version is already released
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          VERSION="$(node scripts/release-info.mjs version)"
          TAG="v${VERSION}"
          SHOULD_RELEASE=true

          if RELEASE_DRAFT="$(gh release view "$TAG" --json isDraft --jq '.isDraft' 2>/dev/null)"; then
            if [ "$RELEASE_DRAFT" = "false" ]; then
              SHOULD_RELEASE=false
            fi
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "should_release=$SHOULD_RELEASE" >> "$GITHUB_OUTPUT"

  verify:
    name: Verify release
    needs: metadata
    if: needs.metadata.outputs.should_release == 'true' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify version, build, tests, and lint
        run: |
          npm run release:check
          npm run check
          cargo fmt --manifest-path src-tauri/Cargo.toml -- --check
          cargo test --manifest-path src-tauri/Cargo.toml
          cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

  prepare:
    name: Prepare GitHub release
    needs: [metadata, verify]
    if: needs.metadata.outputs.should_release == 'true' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Prepare release notes
        run: node scripts/release-info.mjs notes > release-notes.md

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.metadata.outputs.version }}
        shell: bash
        run: |
          TAG="v${VERSION}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --draft --title "$TAG" --notes-file release-notes.md
          else
            gh release create "$TAG" --target "$GITHUB_SHA" --draft --title "$TAG" --notes-file release-notes.md
          fi

  build:
    name: Build (${{ matrix.label }})
    needs: [metadata, verify, prepare]
    if: needs.metadata.outputs.should_release == 'true' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS universal
            platform: macos-latest
            args: --target universal-apple-darwin --bundles dmg
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
          - label: Windows
            platform: windows-latest
            args: --bundles nsis,msi
            rust_targets: ''
          - label: Linux
            platform: ubuntu-22.04
            args: --bundles appimage,deb
            rust_targets: ''
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build distributables
        id: tauri
        uses: tauri-apps/tauri-action@v1.0.0
        env:
          APPLE_SIGNING_IDENTITY: ${{ matrix.platform == 'macos-latest' && '-' || '' }}
        with:
          args: ${{ matrix.args }}
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: tauri-[platform]-[arch]-[bundle]
          releaseAssetNamePattern: '[name]_[version]_[platform]_[arch][setup].[ext]'

      - name: Publish successful platform artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.metadata.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="v${VERSION}"

          found=false
          while IFS= read -r -d '' asset; do
            found=true
            gh release upload "$TAG" "$asset" --clobber
          done < <(
            find src-tauri/target -type f -path '*/bundle/*' \
              \( -name '*.dmg' -o -name '*.exe' -o -name '*.msi' -o -name '*.AppImage' -o -name '*.deb' \) \
              -print0
          )

          if [ "$found" = false ]; then
            echo "The build succeeded but produced no installable artifacts." >&2
            exit 1
          fi

          gh release edit "$TAG" --draft=false --latest
